name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-import-check:
    runs-on: ubuntu-latest
    env:
      PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev dependencies
        run: pip install -e . -r requirements-dev.txt

      - name: Lint
        run: make lint

      - name: Import check
        run: make import-check

      - name: Test
        run: make test-ci 2>&1 | tee /tmp/test_output.txt; exit ${PIPESTATUS[0]}

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: /tmp/test_output.txt

  chromadb-tests:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e . -r requirements-dev.txt
      - name: ChromaDB tests (non-blocking)
        run: pytest tests/ -m "requires_chromadb" -q
