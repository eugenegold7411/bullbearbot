name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-import-check:
    runs-on: ubuntu-latest
    env:
      PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev dependencies
        run: pip install -e . -r requirements-dev.txt

      - name: Lint
        run: make lint

      - name: Import check
        run: make import-check

      - name: Test
        run: |
          pytest tests/ -v --tb=long -r f \
            --ignore=tests/test_scratchpad_memory.py \
            -k "not requires_chromadb and not chromadb" \
            -m "not requires_prompts" \
            2>&1 | tee /tmp/test-output.txt
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            echo "## Test Failures" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "^FAILED|^ERROR|AssertionError|short test summary" /tmp/test-output.txt >> $GITHUB_STEP_SUMMARY || true
            grep -A 30 "short test summary" /tmp/test-output.txt >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          exit $EXIT

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: /tmp/test-output.txt

